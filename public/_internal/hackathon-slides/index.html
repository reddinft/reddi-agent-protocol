<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reddi Agent Protocol, Internal Hackathon Slides</title>
  <style>
    :root { color-scheme: dark; }
    body { margin:0; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background:#0b0f14; color:#eaf0f7; }
    .wrap { display:grid; grid-template-rows:auto 1fr auto; height:100vh; }
    .top { display:flex; flex-wrap:wrap; gap:10px; align-items:center; padding:10px 14px; background:#111827; border-bottom:1px solid #273244; }
    .top button, .top select { background:#1f2937; color:#e5edf8; border:1px solid #334155; border-radius:8px; padding:8px 10px; }
    .top .spacer { flex:1; }
    .stage { position:relative; display:grid; place-items:center; background:#0b0f14; }
    .stage img { max-width:100%; max-height:calc(100vh - 190px); object-fit:contain; border-radius:10px; box-shadow:0 8px 30px rgba(0,0,0,.45); }
    .meta { padding:12px 16px; background:#111827; border-top:1px solid #273244; }
    .title { font-size:18px; font-weight:700; margin-bottom:6px; }
    .subtitle { color:#c7d2e3; margin-bottom:6px; }
    .counter { color:#9fb0c9; font-size:13px; }
    .permalink { color:#8cc7ff; word-break:break-all; font-size:12px; }
    .kbd { font-size:12px; color:#9fb0c9; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <button id="prev">◀ Prev</button>
      <button id="next">Next ▶</button>
      <button id="play">Auto Play</button>
      <label>
        Interval
        <select id="interval">
          <option value="3000">3s</option>
          <option value="5000" selected>5s</option>
          <option value="8000">8s</option>
          <option value="10000">10s</option>
        </select>
      </label>
      <button id="copyLink">Copy Slide Link</button>
      <div class="spacer"></div>
      <div class="kbd">Keys: ← → space</div>
    </div>

    <div class="stage">
      <img id="img" alt="slide" src="" />
    </div>

    <div class="meta">
      <div class="title" id="title"></div>
      <div class="subtitle" id="subtitle"></div>
      <div class="counter" id="counter"></div>
      <div class="permalink" id="permalink"></div>
    </div>
  </div>

  <script>
    const slides = [
      {slug:'home', file:'images/t1-home.png', title:'1. Home', subtitle:'Project overview surface used in video intro'},
      {slug:'specialist-onboarding', file:'images/route-onboarding.png', title:'2. Specialist Onboarding', subtitle:'Endpoint and capability setup flow'},
      {slug:'specialist-dashboard', file:'images/route-specialist.png', title:'3. Specialist Dashboard', subtitle:'Pricing and operations view'},
      {slug:'attestor-dashboard', file:'images/route-attestation.png', title:'4. Attestor Dashboard', subtitle:'Quality and attestation workflow view'},
      {slug:'consumer-dashboard', file:'images/route-consumer.png', title:'5. Consumer Dashboard', subtitle:'Discovery and execution view'},
      {slug:'planner-demo', file:'images/route-demo.png', title:'6. Planner Demo Surface', subtitle:'Prompt-to-execution workflow'},
      {slug:'workflow-controls', file:'images/dogfood-controls.png', title:'7. Workflow Controls', subtitle:'Deterministic test controls'},
      {slug:'released-outcome', file:'images/dogfood-released.png', title:'8. Released Outcome', subtitle:'Escrow release proof state'},
      {slug:'refunded-outcome', file:'images/dogfood-refunded.png', title:'9. Refunded Outcome', subtitle:'Escrow refund proof state'},
      {slug:'x402-code', file:'images/t2-code-demo-ts.png', title:'10. x402 Code', subtitle:'Payment challenge to escrow implementation'},
      {slug:'jupiter-code', file:'images/t4-code-jupiter-ts.png', title:'11. Jupiter Swap V2 Code', subtitle:'Cross-token routing integration'},
      {slug:'surfpool-script', file:'images/t5-code-surfpool-script.png', title:'12. Surfpool Script', subtitle:'Critical reliability lane script'},
      {slug:'torque-code', file:'images/t6-code-torque-client.png', title:'13. Torque Code', subtitle:'Event and leaderboard wiring'},
      {slug:'tx-lock', file:'images/tx-lock-explorer.png', title:'14. Tx Proof, Lock Escrow', subtitle:'Loaded Solana Explorer transaction page'},
      {slug:'tx-register', file:'images/tx-register-agentA-explorer.png', title:'15. Tx Proof, Register Agent', subtitle:'Loaded Solana Explorer transaction page'},
      {slug:'tx-fund', file:'images/tx-fund-agentA-explorer.png', title:'16. Tx Proof, Fund Agent', subtitle:'Loaded Solana Explorer transaction page'},
      {slug:'per-signature-log', file:'images/per-terminal-log.png', title:'17. PER Signature Evidence', subtitle:'TEE-routed private settlement signature from runtime log'}
    ];

    let i = 0;
    let timer = null;
    const img = document.getElementById('img');
    const title = document.getElementById('title');
    const subtitle = document.getElementById('subtitle');
    const counter = document.getElementById('counter');
    const intervalSel = document.getElementById('interval');
    const playBtn = document.getElementById('play');
    const permalinkEl = document.getElementById('permalink');

    const findIndexFromUrl = () => {
      const url = new URL(window.location.href);
      const byNum = Number(url.searchParams.get('slide'));
      if (!Number.isNaN(byNum) && byNum >= 1 && byNum <= slides.length) return byNum - 1;
      const hash = decodeURIComponent((url.hash || '').replace(/^#/, ''));
      if (hash) {
        const idx = slides.findIndex(s => s.slug === hash || s.title.toLowerCase().replace(/[^a-z0-9]+/g, '-') === hash);
        if (idx >= 0) return idx;
      }
      return 0;
    };

    const currentPermalink = () => {
      const s = slides[i];
      const u = new URL(window.location.href);
      u.searchParams.set('slide', String(i + 1));
      u.hash = s.slug;
      return u.toString();
    };

    function render(push = false) {
      const s = slides[i];
      img.src = s.file;
      title.textContent = s.title;
      subtitle.textContent = s.subtitle;
      counter.textContent = `Slide ${i + 1} of ${slides.length} , ${s.file}`;
      const link = currentPermalink();
      permalinkEl.textContent = link;
      if (push) history.replaceState({}, '', link);
    }

    function next() { i = (i + 1) % slides.length; render(true); }
    function prev() { i = (i - 1 + slides.length) % slides.length; render(true); }
    function togglePlay() {
      if (timer) {
        clearInterval(timer);
        timer = null;
        playBtn.textContent = 'Auto Play';
      } else {
        timer = setInterval(next, Number(intervalSel.value));
        playBtn.textContent = 'Pause';
      }
    }

    document.getElementById('next').onclick = next;
    document.getElementById('prev').onclick = prev;
    playBtn.onclick = togglePlay;

    document.getElementById('copyLink').onclick = async () => {
      const link = currentPermalink();
      try {
        await navigator.clipboard.writeText(link);
        const old = permalinkEl.textContent;
        permalinkEl.textContent = `${link} , copied`;
        setTimeout(() => { permalinkEl.textContent = old; }, 1200);
      } catch {
        permalinkEl.textContent = link;
      }
    };

    intervalSel.onchange = () => {
      if (timer) {
        clearInterval(timer);
        timer = setInterval(next, Number(intervalSel.value));
      }
    };

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') next();
      if (e.key === 'ArrowLeft') prev();
      if (e.key === ' ') { e.preventDefault(); togglePlay(); }
    });

    window.addEventListener('hashchange', () => {
      const idx = findIndexFromUrl();
      if (idx !== i) { i = idx; render(false); }
    });

    i = findIndexFromUrl();
    render(true);
  </script>
</body>
</html>
