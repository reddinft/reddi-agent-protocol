name: Surfpool Acceptance (manual)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      lane:
        description: "Acceptance lane to run"
        required: true
        default: "critical"
        type: choice
        options:
          - critical
          - onboarding
          - onboarding-wrapper
          - jupiter-invoke

jobs:
  surfpool-acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run selected Surfpool lane
        shell: bash
        run: |
          set -euo pipefail
          case "${{ github.event.inputs.lane }}" in
            critical)
              npm run test:surfpool:critical
              ;;
            onboarding)
              npm run test:surfpool:onboarding
              ;;
            onboarding-wrapper)
              npm run test:surfpool:onboarding-wrapper
              ;;
            jupiter-invoke)
              npm run test:surfpool:jupiter-invoke
              ;;
            *)
              echo "Unknown lane: ${{ github.event.inputs.lane }}" >&2
              exit 1
              ;;
          esac

      - name: Upload Surfpool artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surfpool-artifacts-${{ github.run_id }}-${{ github.event.inputs.lane }}
          path: artifacts/surfpool*/**
          if-no-files-found: warn
          retention-days: 14
